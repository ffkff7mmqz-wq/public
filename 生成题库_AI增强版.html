<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线答题系统 - AI增强版</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#555;--primary:#4361ee;--primary-hover:#3a56d4;--success:#2ecc71;--danger:#e74c3c;--border:#e0e0e0;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:12px;min-height:100vh}
.app{max-width:920px;margin:0 auto;display:flex;flex-direction:column;gap:10px;max-height:94vh;overflow:hidden}

.hd{background:var(--card);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hd h1{font-size:1.1rem;color:var(--primary);white-space:nowrap}
.hd .fill{flex:1}
.mode-group{display:flex;gap:3px}
.mode-btn{padding:3px 10px;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer;font-size:.78rem;color:var(--text2);transition:all .2s;white-space:nowrap}
.mode-btn:hover{border-color:var(--primary);color:var(--primary)}
.mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.import-box{background:var(--card);border-radius:var(--radius);padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.import-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.import-row .btn{padding:5px 14px;border-radius:5px;font-size:.82rem;cursor:pointer;border:none;white-space:nowrap}
.import-row .btn-pri{background:var(--primary);color:#fff}
.import-row .btn-pri:hover{background:var(--primary-hover)}
.import-row .btn-out{background:#fff;border:1px solid var(--border);color:var(--text2)}
.import-row .btn-out:hover{border-color:var(--primary);color:var(--primary)}
.import-drop{border:1.5px dashed var(--border);border-radius:5px;padding:10px 16px;text-align:center;color:var(--text2);cursor:pointer;font-size:.82rem;transition:all .2s;flex:1;min-width:120px}
.import-drop.dragover{border-color:var(--primary);background:#f0f3ff}
.import-drop .hint{font-size:.72rem;color:#aaa;margin-top:2px}
.import-text{flex:2;min-width:200px}
.import-text textarea{width:100%;min-height:44px;border:1px solid var(--border);border-radius:5px;padding:6px 8px;font-size:.8rem;font-family:inherit;resize:vertical;outline:none;line-height:1.5}
.import-text textarea:focus{border-color:var(--primary)}
.import-info{display:flex;align-items:center;gap:10px;font-size:.78rem;color:var(--text2);flex-wrap:wrap;min-height:20px}
.import-info .err{color:var(--danger)}
.import-info .ok{color:var(--success)}

.main{flex:1;display:flex;gap:10px;min-height:0}
.sidebar{width:90px;flex-shrink:0;background:var(--card);border-radius:var(--radius);padding:6px;overflow-y:auto;overscroll-behavior:contain;display:flex;flex-direction:column;gap:4px}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.num-btn{width:100%;padding:5px 0;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:.78rem;color:var(--text);transition:all .15s;text-align:center}
.num-btn:hover{border-color:var(--primary)}
.num-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.num-btn.correct{background:#d4edda;border-color:var(--success);color:#155724}
.num-btn.wrong{background:#f8d7da;border-color:var(--danger);color:#721c24}
.num-btn.correct.active{background:var(--success);color:#fff}
.num-btn.wrong.active{background:var(--danger);color:#fff}

.content{flex:1;background:var(--card);border-radius:var(--radius);padding:16px 20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;min-width:0}
.q-header{font-size:.85rem;color:var(--text2)}
.q-text{font-size:1.05rem;line-height:1.7;font-weight:500}
.options{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:center;gap:6px;padding:8px 12px;border:2px solid var(--border);border-radius:5px;cursor:pointer;transition:all .15s;user-select:none;font-size:.92rem}
.opt:hover{border-color:var(--primary);background:#f8f9ff}
.opt.selected{border-color:var(--primary);background:#eef0ff}
.opt.correct-reveal{border-color:var(--success);background:#d4edda}
.opt.wrong-reveal{border-color:var(--danger);background:#f8d7da}
.opt input[type="radio"]{display:none}
.opt .dot{width:14px;height:14px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt.selected .dot{border-color:var(--primary)}
.opt.selected .dot::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--primary)}
.opt.correct-reveal .dot{border-color:var(--success);background:var(--success)}
.opt.correct-reveal .dot::after,.opt.wrong-reveal .dot::after{background:#fff;width:6px;height:6px}
.opt.wrong-reveal .dot{border-color:var(--danger);background:var(--danger)}
.opt .letter{font-weight:600;margin-right:3px;color:var(--text2);font-size:.85rem}
.btns{display:flex;gap:6px;flex-wrap:wrap}
.btns .btn{padding:7px 18px;border-radius:5px;font-size:.85rem;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btns .btn-pri{background:var(--primary);color:#fff}
.btns .btn-pri:hover{background:var(--primary-hover)}
.btns .btn-pri:disabled{background:#ccc;cursor:not-allowed}
.btns .btn-out{background:#fff;border:1px solid var(--border);color:var(--text2)}
.btns .btn-out:hover{border-color:var(--primary);color:var(--primary)}
.btns .btn-out:disabled{opacity:.5;cursor:not-allowed}
.feedback{padding:8px 12px;border-radius:5px;font-size:.85rem;display:none;line-height:1.5}
.feedback.show{display:block}
.feedback.success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.feedback.error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.completion{display:none;flex-direction:column;align-items:center;gap:12px;padding:24px}
.completion.show{display:flex}
.completion .score{font-size:2.5rem;color:var(--primary);font-weight:700}
.completion .msg{font-size:.9rem;color:var(--text2)}
.progress-wrap{background:var(--card);border-radius:var(--radius);padding:6px 14px;display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.progress-text{font-size:.78rem;color:var(--text2);white-space:nowrap}
.empty-state{display:none;flex-direction:column;align-items:center;gap:8px;padding:24px;text-align:center;color:var(--text2);font-size:.85rem}
.empty-state.show{display:flex}

@media(max-width:640px){
.app{max-height:none}.main{flex-direction:column}
.sidebar{flex-direction:row;flex-wrap:nowrap;width:100%;height:auto;overflow-x:auto;overflow-y:hidden;padding:4px;gap:3px;max-height:40px}
.sidebar::-webkit-scrollbar{height:2px}
.num-btn{min-width:30px;padding:4px 6px;font-size:.72rem}
.content{padding:12px}
.import-row{flex-direction:column}
.import-row .import-drop{width:100%}
.import-row .import-text{width:100%}
}

/* ===== AI 增强样式 ===== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:var(--radius);padding:20px 24px;max-width:620px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.modal-box h3{font-size:1rem;color:var(--text);margin-bottom:12px}
.modal-box label{font-size:.82rem;color:var(--text2);display:block;margin-top:8px}
.modal-box input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-size:.85rem;outline:none;margin-top:4px}
.modal-box input:focus{border-color:var(--primary)}
.modal-box .hint{font-size:.72rem;color:#aaa;margin-top:2px}
.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal-actions .btn{padding:6px 18px;border-radius:5px;font-size:.85rem;cursor:pointer;border:none}
.modal-actions .btn-pri{background:var(--primary);color:#fff}
.modal-actions .btn-pri:hover{background:var(--primary-hover)}
.modal-actions .btn-out{background:#fff;border:1px solid var(--border);color:var(--text2)}
.modal-actions .btn-out:hover{border-color:var(--primary);color:var(--primary)}
.ai-loading{display:flex;align-items:center;gap:8px;padding:12px;color:var(--text2);font-size:.85rem}
.ai-loading .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.preview-item{border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin-bottom:8px}
.preview-item .pq{font-size:.9rem;font-weight:500;margin-bottom:4px}
.preview-item .popt{font-size:.8rem;color:var(--text2)}
.preview-item .pans{font-size:.8rem;color:var(--success);margin-top:2px}
.preview-item .pans .letter{font-weight:600}
.preview-item .pending-q{font-size:.8rem;color:#999;font-style:italic}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>在线答题</h1>
    <button class="mode-btn" id="btnAIGear" title="AI 设置" style="font-size:.9rem;padding:3px 8px">⚙️</button>
    <div class="fill"></div>
    <div class="mode-group" id="modeGroup">
      <button class="mode-btn active" data-m="sequential">顺序做题</button>
      <button class="mode-btn" data-m="shuffle">随机打乱</button>
      <button class="mode-btn" data-m="review">错题重做</button>
    </div>
  </div>

  <div class="import-box" id="importBox">
    <div class="import-row">
      <div class="import-drop" id="dropZone">
        <div>拖拽文件到此处</div>
        <div class="hint">.xlsx .xls .docx .txt</div>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.docx,.txt" hidden>
        <div id="fname" style="color:var(--primary);margin-top:4px;display:none"></div>
      </div>
      <div class="import-text">
        <textarea id="txtInput" placeholder="粘贴任意格式的题目，AI 自动识别整理&#10;&#10;例：1.中国的首都是？A.北京 B.上海 C.广州 D.深圳 答案：A"></textarea>
      </div>
    </div>
    <div class="import-info" id="importInfo">
      <span id="infoMsg">粘贴题目后点击 AI 识别生成，或拖入 .xlsx/.docx/.txt 文件</span>
    </div>
    <div class="import-row">
      <button class="btn btn-pri" id="btnAIGen">🤖 AI 识别生成</button>
      <button class="btn btn-out" id="btnGen">📋 手动解析</button>
      <button class="btn btn-out" id="btnReset">恢复默认</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div class="q-header" id="qNum"></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="btns">
        <button class="btn btn-pri" id="btnSubmit" disabled>提交本题</button>
        <button class="btn btn-out" id="btnPrev" disabled>上一题</button>
        <button class="btn btn-out" id="btnNext">下一题</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="completion" id="completion">
        <div class="score" id="scoreDisplay"></div>
        <div class="msg" id="completionMsg"></div>
        <button class="btn btn-pri" onclick="location.reload()">重新开始</button>
      </div>
      <div class="empty-state" id="emptyState">还没有错题，先去答些题吧</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="progress-text" id="progText">0/0</div>
  </div>
</div>

<!-- AI 设置弹窗 -->
<div class="modal-overlay" id="aiModal">
  <div class="modal-box">
    <h3>🤖 AI 排版设置</h3>
    <label>API Key（密钥）</label>
    <input type="password" id="aiKey" placeholder="sk-...">
    <div class="hint">支持 OpenAI / DeepSeek / 任何兼容接口的 API Key</div>
    <label>API 地址</label>
    <input type="text" id="aiBase" placeholder="https://api.deepseek.com">
    <div class="hint">默认 DeepSeek；如用 OpenAI 请填 https://api.openai.com</div>
    <label>模型名称</label>
    <input type="text" id="aiModel" placeholder="deepseek-chat">
    <div class="hint">DeepSeek: deepseek-chat | OpenAI: gpt-4o-mini 等</div>
    <div class="modal-actions">
      <button class="btn btn-out" id="btnAICancel">取消</button>
      <button class="btn btn-pri" id="btnAISave">保存</button>
    </div>
  </div>
</div>

<!-- AI 预览弹窗 -->
<div class="modal-overlay" id="previewModal">
  <div class="modal-box">
    <h3>📋 AI 排版预览</h3>
    <div id="previewList" style="margin-bottom:10px"></div>
    <div style="font-size:.82rem;color:var(--text2);margin-bottom:8px">
      共 <span id="previewCount">0</span> 题 ·
      <span style="color:var(--success)" id="previewOk">0</span> 题可识别 ·
      <span style="color:var(--danger)" id="previewFail">0</span> 题需手动调整
    </div>
    <div class="modal-actions">
      <button class="btn btn-out" id="btnPreviewCancel">取消</button>
      <button class="btn btn-pri" id="btnPreviewConfirm">✓ 确认导入</button>
    </div>
  </div>
</div>

<script>
var DS = [
  {id:1,q:"中国的首都是哪个城市？",opt:["北京","上海","广州","深圳"],ans:0},
  {id:2,q:"地球上面积最大的海洋是？",opt:["大西洋","印度洋","太平洋","北冰洋"],ans:2},
  {id:3,q:"以下哪个是光合作用的产物？",opt:["二氧化碳","氧气","氮气","氢气"],ans:1},
  {id:4,q:"一年有多少个月？",opt:["10","11","12","13"],ans:2},
  {id:5,q:"水的化学式是？",opt:["H₂O","CO₂","NaCl","O₂"],ans:0},
  {id:6,q:"太阳系中最大的行星是？",opt:["地球","火星","土星","木星"],ans:3},
  {id:7,q:"被称为世界屋脊的高原是？",opt:["黄土高原","青藏高原","云贵高原","内蒙古高原"],ans:1},
  {id:8,q:"以下谁提出了相对论？",opt:["牛顿","爱因斯坦","伽利略","霍金"],ans:1},
  {id:9,q:"光年是什么单位？",opt:["时间","速度","距离","亮度"],ans:2},
  {id:10,q:"DNA的中文全称是？",opt:["核糖核酸","脱氧核糖核酸","氨基酸","蛋白质"],ans:1}
];

function ldQ(){
  try{var r=localStorage.getItem('qq');
    if(r){var a=JSON.parse(r);if(Array.isArray(a)&&a.length)return a}
  }catch(e){}
  return DS.map(function(q){return Object.assign({},q)})
}

var QQ=ldQ(),_pend=[],_adv=null,_txtTim=null;
var st={m:'sequential',ord:[],idx:0,sel:{},res:{},qst:{},sub:false,fin:false,ws:new Set()};

function sh(a){var b=[].concat(a);for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}

function ord(){
  if(st.m==='sequential')return QQ.map(function(q){return q.id});
  if(st.m==='shuffle')return sh(QQ.map(function(q){return q.id}));
  if(st.m==='review'){var a=[];st.ws.forEach(function(v){a.push(v)});return a}
}

function gbi(id){return QQ.find(function(q){return q.id===id})}
function cq(){return st.ord[st.idx]}

function clrT(){if(_adv){clearTimeout(_adv);_adv=null}}
function ldWS(){try{var r=localStorage.getItem('qw');return r?new Set(JSON.parse(r)):new Set()}catch(e){return new Set()}}
function svWS(s){try{localStorage.setItem('qw',JSON.stringify([].concat(Array.from(s))))}catch(e){}}

function aIdx(v){
  var s=String(v).trim().toUpperCase();
  if(s==='A'||s==='0'||s==='1')return 0;
  if(s==='B'||s==='2')return 1;
  if(s==='C'||s==='3')return 2;
  if(s==='D'||s==='4')return 3;
  var n=parseInt(s);return(!isNaN(n)&&n>=0&&n<=3)?n:-1;
}

function prsDL(t){
  var ls=t.split('\n').filter(function(l){return l.trim()}),qs=[];
  for(var i=0;i<ls.length;i++){
    var sep=ls[i].indexOf('|')>=0?'|':'\t';
    var pts=ls[i].split(sep).map(function(s){return s.trim()}).filter(function(s){return s});
    if(pts.length<5)continue;
    var q=pts[0],op=pts.slice(1,-1);if(op.length<2)continue;
    var a=aIdx(pts[pts.length-1]);if(a<0||a>=op.length)continue;
    while(op.length<4)op.push('');qs.push({q:q,opt:op.slice(0,4),ans:a});
  }
  return qs;
}

function prsNB(t){
  var ls=t.split('\n'),lines=[];
  // join multi-line questions and split multi-question lines
  for(var i=0;i<ls.length;i++){
    var l=ls[i].trim();if(!l)continue;
    // split line if it contains multiple numbered questions
    var parts=l.split(/(?=\d+[．\.\、\)）])/).filter(function(s){return s.trim()});
    if(parts.length>1){for(var p=0;p<parts.length;p++)lines.push(parts[p].trim())}
    else lines.push(l);
  }
  var qs=[],reNum=/^(\d+)[．\.\、\)）]\s*(.*)/,reTF=/[（(]\s*([√\u221A]|x|X)\s*[）)]/;
  var i=0;
  while(i<lines.length&&!/^\d+/.test(lines[i]))i++;
  while(i<lines.length){
    var m=lines[i].match(reNum);
    if(!m){i++;continue}
    i++;
    var qt=m[2].trim();
    if(!qt)continue;
    // check true/false: (√) or (x)
    var tf=qt.match(reTF);
    if(tf){
      var ai=(tf[1]==='x'||tf[1]==='X')?1:0;
      qt=qt.replace(/\s*[（(]\s*([√\u221A]|x|X)\s*[）)]\s*$/,'').trim();
      qs.push({q:qt,opt:["正确","错误"],ans:ai});
      continue;
    }
    // extract single-letter answer from text: (A) （A）
    var ai=-1,am=qt.match(/[（(]\s*([A-Da-d])\s*[）)]/);
    var multiAns=qt.match(/[（(]\s*([A-Da-d]{2,})\s*[）)]/); // (ABC) = multi-answer
    if(multiAns){
      var ansStr=multiAns[1].toUpperCase(),ansArr=[];
      for(var ci=0;ci<ansStr.length;ci++){var idx=aIdx(ansStr[ci]);if(idx>=0)ansArr.push(idx)}
      qt=qt.replace(/\s*[（(]\s*[A-Da-d]{2,}\s*[）)]\s*$/,'').trim();
      ai=ansArr;
    }
    if(am){ai=aIdx(am[1]);qt=qt.replace(/\s*[（(]\s*[A-Da-d]\s*[）)]\s*$/,'').trim()}
    // collect options
    var op=[];
    while(i<lines.length){
      var cl=lines[i];i++;
      if(!cl)continue;
      if(reNum.test(cl)){i--;break}
      // try to split multi-option line: "A．text B．text C．text D．text"
      var parts2=[],optRe2=/[A-Da-d][．\.\、\)）]\s*[\s\S]*?(?=[A-Da-d][．\.\、\)）]|$)/g,m2;
      while((m2=optRe2.exec(cl))!==null)parts2.push(m2[0].trim());
      if(parts2&&parts2.length>=2){
        for(var p=0;p<parts2.length;p++){
          var om=parts2[p].match(/^[A-Da-d][．\.\、\)）]\s*(.*)/);
          if(om&&om[1].trim())op.push(om[1].trim())
        }
        continue;
      }
      // single option line
      var om=cl.match(/^([A-Da-d])[．\.\、\)）]\s*(.*)/);
      if(om){op.push(om[2].trim());continue}
      // answer line
      var alm=cl.match(/^答案[：:]\s*([A-Da-d])/);
      if(alm){ai=aIdx(alm[1]);break}
      if(op.length>=2)break;
    }
    if(qt&&op.length>=2){
      if(Array.isArray(ai)){qs.push({q:qt,opt:op,ans:ai})}
      else{while(op.length<4)op.push('');if(ai<0||ai>=4)ai=0;qs.push({q:qt,opt:op.slice(0,4),ans:ai})}
    }
  }
  return qs;
}

function aP(t){
  if(!t||!t.trim())return[];
  if(/^\d+[．\.\、\)）]/.test(t.trim())){var r=prsNB(t);if(r.length)return r}
  var r=prsDL(t);return r.length?r:prsNB(t);
}

function setInfo(m,c){var e=document.getElementById('infoMsg');e.textContent=m;e.className=c||''}
function hdlFile(f){
  setInfo('正在解析：'+f.name,'');
  document.getElementById('fname').textContent='📄 '+f.name;
  document.getElementById('fname').style.display='block';
  var ext=f.name.split('.').pop().toLowerCase();
  if(ext==='xlsx'||ext==='xls'){
    if(typeof XLSX==='undefined'){setInfo('SheetJS 库未加载，请刷新页面','err');return}
    var r=new FileReader();
    r.onload=function(e){
      try{
        var d=new Uint8Array(e.target.result),wb=XLSX.read(d,{type:'array'}),s=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(s,{header:1,defval:''});
        var start=0;
        if(rows.length&&/题目|问题|question|题干/i.test(String(rows[0][0]||'').trim()))start=1;
        _pend=[];
        for(var i=start;i<rows.length;i++){
          var row=rows[i];if(!row||!row[1])continue;
          var q=String(row[1]||'').trim(),opts=[String(row[4]||'').trim(),String(row[5]||'').trim(),String(row[6]||'').trim(),String(row[7]||'').trim()];
          var av=String(row[2]||'').trim(),ai=aIdx(av);
          if(q&&opts.some(function(o){return o})&&ai>=0){while(opts.length<4)opts.push('');_pend.push({q:q,opt:opts.slice(0,4),ans:ai})}
        }
        setInfo('解析出 '+_pend.length+' 题，点击"生成题库"应用','ok');
      }catch(err){setInfo('解析失败：'+err.message,'err');_pend=[]}
    };
    r.readAsArrayBuffer(f);
  }else if(ext==='docx'){
    if(typeof mammoth==='undefined'){setInfo('mammoth.js 未加载，请刷新','err');return}
    var r=new FileReader();
    r.onload=function(e){
      mammoth.extractRawText({arrayBuffer:e.target.result}).then(function(res){
        _pend=aP(res.value);
        setInfo('解析出 '+_pend.length+' 题'+(_pend.length?'，点击生成':'，格式有误'),_pend.length?'ok':'err');
      }).catch(function(err){setInfo('解析失败：'+err.message,'err')});
    };
    r.readAsArrayBuffer(f);
  }else if(ext==='txt'){
    var r=new FileReader();
    r.onload=function(e){_pend=aP(e.target.result);setInfo('解析出 '+_pend.length+' 题'+(_pend.length?'，点击生成':'，格式有误'),_pend.length?'ok':'err')};
    r.readAsText(f);
  }else{
    setInfo('不支持 .'+ext+' 格式，请使用 xlsx/xls/docx/txt','err');
  }
}

function genQ(){
  if(!_pend.length){
    var t=document.getElementById('txtInput').value.trim();
    if(t)_pend=aP(t);
    else{setInfo('请先拖入文件或在文本框中粘贴题目','err');return}
  }
  if(!_pend.length){setInfo('未能解析出题目，请检查格式','err');return}
  QQ=_pend.map(function(q,i){return {id:i+1,q:q.q,opt:q.opt,ans:q.ans}});
  localStorage.setItem('qq',JSON.stringify(QQ));
  _pend=[];document.getElementById('fname').style.display='none';
  document.getElementById('txtInput').value='';
  setInfo('已生成 '+QQ.length+' 道题的题库','ok');
  st.ord=ord();st.idx=0;st.sub=false;st.fin=false;
  st.sel={};st.res={};st.qst={};
  rA();
}

function rstD(){
  localStorage.removeItem('qq');QQ=DS.map(function(q){return Object.assign({},q)});
  _pend=[];document.getElementById('fname').style.display='none';
  document.getElementById('txtInput').value='';setInfo('已恢复默认题库','');
  st.ord=ord();st.idx=0;st.sub=false;st.fin=false;
  st.sel={};st.res={};st.qst={};
  rA();
}

function rA(){rS();rC();rP();rMB()}
function rMB(){document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.m===st.m)})}
function rS(){
  var sb=document.getElementById('sidebar'),cur=cq();
  sb.innerHTML=st.ord.map(function(qid,i){
    var s=st.qst[qid],c='num-btn';
    if(qid===cur)c+=' active';if(s==='correct')c+=' correct';if(s==='wrong')c+=' wrong';
    return '<button class="'+c+'" data-q="'+qid+'" data-i="'+i+'">'+(i+1)+'</button>';
  }).join('');
  requestAnimationFrame(function(){var a=sb.querySelector('.num-btn.active');if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'})});
}
function rC(){
  if(!st.ord.length){sE();return}
  if(st.fin){sF();return}
  hC();hE();
  var qid=cq();if(qid===undefined){sF();return}
  var q=gbi(qid),total=st.ord.length,pos=st.idx+1;
  document.getElementById('qNum').textContent='第 '+pos+' 题 / 共 '+total+' 题';
  document.getElementById('qText').innerHTML=q.q;
  var sel=st.sel[qid],sub=st.sub,isMulti=Array.isArray(q.ans);
  function inArr(a,v){return a&&a.indexOf&&a.indexOf(v)>=0}
  document.getElementById('options').innerHTML=q.opt.map(function(o,i){
    var c='opt';
    if(isMulti){if(inArr(sel,i))c+=' selected'}
    else{if(sel===i)c+=' selected'}
    if(sub){
      if(isMulti&&inArr(q.ans,i))c+=' correct-reveal';
      else if(!isMulti&&i===q.ans)c+=' correct-reveal';
      if(isMulti&&inArr(sel,i)&&!inArr(q.ans,i))c+=' wrong-reveal';
      else if(!isMulti&&i===sel&&i!==q.ans)c+=' wrong-reveal'
    }
    var ip=isMulti?'checkbox':'radio';
    var chk=isMulti?inArr(sel,i):sel===i;
    return '<label class="'+c+'"><input type="'+ip+'" name="o" value="'+i+'"'+(chk?' checked':'')+(sub?' disabled':'')+'><span class="dot"></span><span class="letter">'+String.fromCharCode(65+i)+'.</span>'+o+'</label>';
  }).join('');
  if(!sub){
    document.querySelectorAll('#options .opt').forEach(function(o){
      o.addEventListener('click',function(){
        var r=o.querySelector('input');
        if(r&&!r.disabled){
          if(isMulti){
            var val=parseInt(r.value);
            if(!st.sel[qid])st.sel[qid]=[];
            if(r.checked){if(st.sel[qid].indexOf(val)<0)st.sel[qid].push(val)}
            else{var idx=st.sel[qid].indexOf(val);if(idx>=0)st.sel[qid].splice(idx,1)}
          }else{
            r.checked=true;st.sel[qid]=parseInt(r.value)
          }
          uS();rOS(qid)
        }
      })
    })
  }
  uS();rF(qid);uN(qid,total);
}
function rOS(qid){
  var si=st.sel[qid];
  document.querySelectorAll('#options .opt').forEach(function(o,i){
    o.classList.toggle('selected',Array.isArray(si)?si.indexOf(i)>=0:si===i)
  })
}
function arrEq(a,b){
  if(!Array.isArray(a)||!Array.isArray(b)||a.length!==b.length)return false;
  var sa=[].concat(a).sort(),sb=[].concat(b).sort();
  for(var i=0;i<sa.length;i++)if(sa[i]!==sb[i])return false;
  return true;
}
function uS(){
  var b=document.getElementById('btnSubmit'),sl=st.sel[cq()],has=Array.isArray(sl)?sl.length>0:sl!==undefined;
  b.disabled=!has||st.sub;b.textContent=st.sub?'已提交 ✓':'提交本题';
}
function uN(qid,total){
  document.getElementById('btnPrev').disabled=st.idx===0;
  var nb=document.getElementById('btnNext');
  nb.textContent=st.idx>=total-1&&st.sub?'查看成绩':'下一题';
}
function rF(qid){
  var fb=document.getElementById('feedback');fb.className='feedback';fb.style.display='none';
  if(!st.sub)return;
  var q=gbi(qid),r=st.res[qid];
  fb.classList.add('show');
  if(r==='correct'){fb.classList.add('success');fb.innerHTML='✓ 回答正确！'}
  else{
    var correctStr='';
    if(Array.isArray(q.ans)){
      correctStr=q.ans.map(function(a){return String.fromCharCode(65+a)}).join('、')+'. ';
      correctStr+=q.ans.map(function(a){return q.opt[a]}).join('；');
    }else{
      correctStr=String.fromCharCode(65+q.ans)+'. '+q.opt[q.ans];
    }
    fb.classList.add('error');fb.innerHTML='✗ 回答错误！正确答案是：<strong>'+correctStr+'</strong>'
  }
}
function rP(){
  var total=st.ord.length,ansd=Object.keys(st.res).length,p=total?Math.round(ansd/total*100):0;
  document.getElementById('progFill').style.width=p+'%';document.getElementById('progText').textContent=ansd+'/'+total;
}
function sF(){
  ['qNum','qText','options','feedback'].forEach(function(id){var el=document.getElementById(id);if(id==='feedback'){el.className='feedback';el.style.display='none'}else el.textContent=''});
  document.getElementById('btnSubmit').disabled=true;document.getElementById('btnSubmit').textContent='全部完成';
  document.getElementById('btnPrev').disabled=true;document.getElementById('btnNext').textContent='重新开始';
  var total=st.ord.length,ct=Object.values(st.res).filter(function(r){return r==='correct'}).length;
  document.getElementById('scoreDisplay').textContent=ct+'/'+total;
  var p=total?Math.round(ct/total*100):0,m=p>=80?'太棒了！':p>=60?'还不错！':'多练习一下吧！';
  document.getElementById('completionMsg').textContent=m;
  document.getElementById('completion').classList.add('show');
  document.getElementById('progFill').style.width='100%';document.getElementById('progText').textContent=total+'/'+total;
}
function hC(){document.getElementById('completion').classList.remove('show')}
function sE(){
  hC();['qNum','qText','options'].forEach(function(id){document.getElementById(id).textContent=''});
  document.getElementById('btnSubmit').disabled=true;document.getElementById('btnSubmit').textContent='提交本题';
  document.getElementById('btnPrev').disabled=true;document.getElementById('btnNext').textContent='下一题';
  document.getElementById('feedback').className='feedback';document.getElementById('feedback').style.display='none';
  document.getElementById('emptyState').classList.add('show');
}
function hE(){document.getElementById('emptyState').classList.remove('show')}

function subA(){
  if(st.sub)return;
  var qid=cq();if(qid===undefined)return;
  var q=gbi(qid),sl=st.sel[qid];if(sl===undefined||sl===null)return;
  var ok=Array.isArray(q.ans)?arrEq(sl,q.ans):sl===q.ans;
  st.res[qid]=ok?'correct':'wrong';st.qst[qid]=ok?'correct':'wrong';st.sub=true;
  if(!ok)st.ws.add(qid);else st.ws.delete(qid);svWS(st.ws);
  rA();
  if(st.m==='review')return;
  clrT();
  if(st.idx>=st.ord.length-1){_adv=setTimeout(function(){_adv=null;st.fin=true;rA()},1500)}
  else{_adv=setTimeout(function(){_adv=null;st.idx++;st.sub=st.res[st.ord[st.idx]]!==undefined;rA()},1500)}
}
function goN(){
  clrT();
  if(st.fin){rA2();return}
  if(st.idx>=st.ord.length-1){if(!st.sub)return;st.fin=true;rA();return}
  st.idx++;st.sub=st.res[st.ord[st.idx]]!==undefined;rA();
}
function goP(){
  clrT();
  if(st.idx<=0)return;
  st.idx--;st.sub=st.res[st.ord[st.idx]]!==undefined;rA();
}
function goT(qid,i){
  clrT();st.idx=i;st.fin=false;st.sub=st.res[qid]!==undefined;rA();
}
function swM(m){
  clrT();
  if(m==='review')st.ws=ldWS();
  st.m=m;st.ord=ord();st.idx=0;st.sub=false;st.fin=false;
  st.sel={};st.res={};st.qst={};
  if(m==='review')st.ws.forEach(function(qid){st.qst[qid]='wrong'});
  rA();
}
function rA2(){
  clrT();st.ws=ldWS();st.m='sequential';st.ord=ord();st.idx=0;
  st.sel={};st.res={};st.qst={};st.sub=false;st.fin=false;rA();
}

document.getElementById('btnSubmit').addEventListener('click',subA);
document.getElementById('btnNext').addEventListener('click',goN);
document.getElementById('btnPrev').addEventListener('click',goP);
document.getElementById('sidebar').addEventListener('click',function(e){
  var b=e.target.closest('.num-btn');if(!b)return;
  goT(parseInt(b.dataset.q),parseInt(b.dataset.i));
});
document.getElementById('modeGroup').addEventListener('click',function(e){
  var b=e.target.closest('.mode-btn');if(!b||b.dataset.m===st.m)return;swM(b.dataset.m);
});

var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover')});
dz.addEventListener('dragleave',function(){dz.classList.remove('dragover')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])hdlFile(e.dataTransfer.files[0])});
dz.addEventListener('click',function(e){if(e.target.tagName!=='INPUT'&&e.target.tagName!=='BUTTON')document.getElementById('fileInput').click()});
document.getElementById('fileInput').addEventListener('change',function(e){if(e.target.files[0])hdlFile(e.target.files[0]);e.target.value=''});
document.getElementById('txtInput').addEventListener('input',function(){clearTimeout(_txtTim);var me=this;_txtTim=setTimeout(function(){var qs=aP(me.value);if(qs.length){_pend=qs;setInfo('解析出 '+qs.length+' 题，点击生成','ok')}else{_pend=[];setInfo('','')};
document.getElementById('btnGen').addEventListener('click',genQ);
document.getElementById('btnReset').addEventListener('click',rstD);

st.ws=ldWS();st.ord=ord();rA();

// ======================== AI 增强功能 ========================
var apiCfg = {
  key: (function(){try{return localStorage.getItem('ai_key')||''}catch(e){return ''}})(),
  base: (function(){try{return localStorage.getItem('ai_base')||'https://api.deepseek.com'}catch(e){return 'https://api.deepseek.com'}})(),
  model: (function(){try{return localStorage.getItem('ai_model')||'deepseek-chat'}catch(e){return 'deepseek-chat'}})()
};

// AI 设置弹窗
document.getElementById('btnAIGear').addEventListener('click',function(){
  document.getElementById('aiKey').value=apiCfg.key;
  document.getElementById('aiBase').value=apiCfg.base;
  document.getElementById('aiModel').value=apiCfg.model;
  document.getElementById('aiModal').style.display='flex';
});
document.getElementById('btnAICancel').addEventListener('click',function(){
  document.getElementById('aiModal').style.display='none';
});
document.getElementById('btnAISave').addEventListener('click',function(){
  apiCfg.key=document.getElementById('aiKey').value.trim();
  apiCfg.base=document.getElementById('aiBase').value.trim();
  apiCfg.model=document.getElementById('aiModel').value.trim();
  try{localStorage.setItem('ai_key',apiCfg.key)}catch(e){}
  try{localStorage.setItem('ai_base',apiCfg.base)}catch(e){}
  try{localStorage.setItem('ai_model',apiCfg.model)}catch(e){}
  document.getElementById('aiModal').style.display='none';
  setInfo('✅ AI 设置已保存','ok');
});
document.getElementById('aiModal').addEventListener('click',function(e){
  if(e.target===this)this.style.display='none';
});

// AI 识别生成
document.getElementById('btnAIGen').addEventListener('click',async function(){
  var txt=document.getElementById('txtInput').value.trim();
  if(!txt){setInfo('请先粘贴题目内容','err');return}
  if(!apiCfg.key){setInfo('请先点击 ⚙️ 配置 API Key','err');document.getElementById('btnAIGear').click();return}
  var btn=this;
  btn.disabled=true;btn.textContent='⏳ AI 识别中...';
  setInfo('正在调用 AI 识别整理...','');
  try{
    var url=apiCfg.base.replace(/\/+$/,'')+'/v1/chat/completions';
    var prompt='你是一个题目格式化专家。请将以下原始题目识别并整理成标准格式，每行一题，严格按照以下格式：\n\n题目文字 | 选项A | 选项B | 选项C | 选项D | 答案字母\n\n规则：\n1. 保留原题目的完整内容，不要改动题目的任何文字\n2. 智能识别题目和选项的对应关系，哪怕格式混乱也要正确配对\n3. 每道题4个选项，如果原文只有2个选项（如判断题），用"正确"/"错误"补全\n4. 答案用字母 A/B/C/D 表示\n5. 判断题答案 A=正确 B=错误\n6. 如果原文没有明确答案，根据常识填入你认为正确的答案\n7. 只输出格式化后的内容，不要任何解释、不要编号、不要多余文字\n8. 如果某段内容确实不像是题目，跳过不输出\n\n原始内容：\n'+txt;
    var resp=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiCfg.key},
      body:JSON.stringify({model:apiCfg.model,messages:[{role:'user',content:prompt}],temperature:0.1,max_tokens:4096})
    });
    var data=await resp.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    var aiText=data.choices[0].message.content;
    var aiQs=aP(aiText);
    // 额外解析 pipe 格式
    if(!aiQs.length){
      var lines=aiText.split('\n').filter(function(l){return l.trim()});
      for(var i=0;i<lines.length;i++){
        var pts=lines[i].split('|').map(function(s){return s.trim()});
        if(pts.length<6)continue;
        var q=pts[0],op=pts.slice(1,5),ansLetter=pts[5].toUpperCase().trim();
        var ansIdx=aIdx(ansLetter);
        if(ansIdx<0&&ansLetter.length>1){
          var ansArr=[];
          for(var ci=0;ci<ansLetter.length;ci++){var idx=aIdx(ansLetter[ci]);if(idx>=0)ansArr.push(idx)}
          if(ansArr.length)aiQs.push({q:q,opt:op,ans:ansArr})
        }else if(ansIdx>=0&&op.some(function(o){return o})){
          aiQs.push({q:q,opt:op,ans:ansIdx})
        }
      }
    }
    var unrecognized=[];
    var uLines=aiText.split('\n').filter(function(l){return /无法识别/i.test(l)});
    for(var i=0;i<uLines.length;i++){
      var m=uLines[i].match(/无法识别[：:]\s*(.*)/);
      if(m)unrecognized.push(m[1]);else unrecognized.push(uLines[i].replace(/^.*?无法识别[：:]?\s*/,''));
    }
    showPreview(aiQs,unrecognized);
  }catch(e){setInfo('❌ AI 调用失败：'+e.message,'err')}
  btn.disabled=false;btn.textContent='🤖 AI 识别生成';
});

function showPreview(qs,unrecognized){
  var list=document.getElementById('previewList');
  var okCount=0,failCount=0;
  list.innerHTML='';
  qs.forEach(function(q,i){
    okCount++;
    var ansStr=Array.isArray(q.ans)?q.ans.map(function(a){return String.fromCharCode(65+a)}).join('、'):String.fromCharCode(65+q.ans);
    var optStr=q.opt.filter(function(o){return o}).map(function(o,i){return String.fromCharCode(65+i)+'. '+o}).join(' ｜ ');
    var div=document.createElement('div');
    div.className='preview-item';
    div.innerHTML='<div class="pq">'+(i+1)+'. '+escHtml(q.q)+'</div><div class="popt">'+escHtml(optStr)+'</div><div class="pans">✅ 答案：<span class="letter">'+ansStr+'</span></div>';
    list.appendChild(div);
  });
  unrecognized.forEach(function(u){
    failCount++;
    var div=document.createElement('div');
    div.className='preview-item';
    div.innerHTML='<div class="pending-q">❌ 无法识别：'+escHtml(u)+'</div>';
    list.appendChild(div);
  });
  document.getElementById('previewCount').textContent=qs.length+unrecognized.length;
  document.getElementById('previewOk').textContent=okCount;
  document.getElementById('previewFail').textContent=failCount;
  window._aiPreviewQs=qs;
  document.getElementById('previewModal').style.display='flex';
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// 预览弹窗操作
document.getElementById('btnPreviewCancel').addEventListener('click',function(){
  document.getElementById('previewModal').style.display='none';
  window._aiPreviewQs=null;
});
document.getElementById('btnPreviewConfirm').addEventListener('click',function(){
  var qs=window._aiPreviewQs;
  if(!qs||!qs.length){setInfo('没有可导入的题目','err');document.getElementById('previewModal').style.display='none';return}
  document.getElementById('previewModal').style.display='none';
  QQ=qs.map(function(q,i){return {id:i+1,q:q.q,opt:q.opt,ans:q.ans}});
  localStorage.setItem('qq',JSON.stringify(QQ));
  _pend=[];document.getElementById('fname').style.display='none';
  document.getElementById('txtInput').value='';
  setInfo('✅ AI 识别完成，已导入 '+QQ.length+' 道题！','ok');
  st.ord=ord();st.idx=0;st.sub=false;st.fin=false;
  st.sel={};st.res={};st.qst={};
  rA();
  window._aiPreviewQs=null;
});
document.getElementById('previewModal').addEventListener('click',function(e){
  if(e.target===this){this.style.display='none';window._aiPreviewQs=null}
});
